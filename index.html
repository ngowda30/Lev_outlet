<!DOCTYPE html>
<html>
<head>
    <title>Outlet Search Dashboard</title>
    <meta name="viewport" content="width=1280">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            min-width: 1280px;
        }

        /* ── HEADER BOX ── */
        .header-box {
            margin: 18px 30px 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: #fff;
        }

        .header-box img.levista-logo {
            height: 55px;
            object-fit: contain;
            display: block;
        }

        .header-box img.sln-logo {
            height: 70px;
            object-fit: contain;
            border-radius: 8px;
            display: block;
        }

        /* ── SEARCH BAR ── */
        .search-section {
            margin: 20px 30px 8px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-section input {
            padding: 10px 15px;
            width: 360px;
            border-radius: 5px;
            border: 1.5px solid #b0bec5;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-section input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }

        .search-section button {
            padding: 10px 24px;
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .search-section button:hover { background: #1b5e20; }

        #status {
            font-size: 12px;
            color: #888;
            margin: 0 30px 2px 30px;
        }

        #resultInfo {
            font-size: 12px;
            color: #444;
            margin: 0 30px 6px 30px;
        }

        /* ── TABLE (hidden until search) ── */
        .table-wrapper {
            display: none;
            margin: 0 30px 40px 30px;
            overflow-x: auto;
            border: 1.5px solid #a5d6a7;
            border-radius: 4px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            font-size: 12.5px;
        }

        thead tr th {
            background: #2e7d32;
            color: #fff;
            padding: 9px 11px;
            text-align: left;
            font-weight: 700;
            font-size: 11.5px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            border: 1px solid #1b5e20;
        }

        tbody tr td {
            padding: 8px 11px;
            border: 1px solid #e0e0e0;
            color: #222;
            white-space: nowrap;
        }

        tbody tr:nth-child(even) { background: #f9fbe7; }
        tbody tr:hover { background: #e8f5e9; }

        .no-data {
            text-align: center;
            padding: 28px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- HEADER BOX -->
<div class="header-box">
    <img class="levista-logo" src="levista.jpg" alt="Levista">
    <img class="sln-logo" src="logo-sln.webp" alt="SLN">
</div>

<!-- SEARCH -->
<div class="search-section">
    <input type="text" id="searchInput"
           placeholder="Type Outlet ID or Name..."
           onkeyup="handleKey(event)">
    <button onclick="triggerSearch()">Search</button>
</div>

<div id="status"></div>
<div id="resultInfo"></div>

<!-- TABLE -->
<div class="table-wrapper" id="tableWrapper">
    <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API_URL = "https://opensheet.elk.sh/17qYYhekFBD-KIoUTMPlXLm7sXXaXHcsYQK1v2R-FqV4/1";

    const PREFERRED_COLS = [
        "OUTLET ID","OUTLET NAME","ZONE","RSM","ASM","SO",
        "BASE POINTS","FOCUS POINTS","GROWTH POINTS 1",
        "GROWTH POINTS 2","GROWTH POINTS 3","TOTAL POINTS"
    ];

    let sheetData = [];
    let orderedHeaders = [];

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            sheetData = await res.json();

            const sheetKeys = Object.keys(sheetData[0]);
            const upperMap = {};
            sheetKeys.forEach(k => upperMap[k.trim().toUpperCase()] = k);

            orderedHeaders = [];
            PREFERRED_COLS.forEach(col => {
                if (upperMap[col]) orderedHeaders.push(upperMap[col]);
            });
            sheetKeys.forEach(k => {
                if (!orderedHeaders.includes(k)) orderedHeaders.push(k);
            });

            buildHeader();
            document.getElementById("status").innerText =
                sheetData.length + " records loaded. Search to view data.";
        } catch (e) {
            document.getElementById("status").innerText = "Error loading data.";
            console.error(e);
        }
    }

    function buildHeader() {
        const tr = document.createElement("tr");
        orderedHeaders.forEach(h => {
            const th = document.createElement("th");
            th.textContent = h.trim().toUpperCase();
            tr.appendChild(th);
        });
        document.getElementById("tableHead").innerHTML = "";
        document.getElementById("tableHead").appendChild(tr);
    }

    function displayData(data) {
        const body = document.getElementById("tableBody");
        body.innerHTML = "";

        if (!data.length) {
            body.innerHTML = `<tr><td colspan="${orderedHeaders.length}" class="no-data">No records found.</td></tr>`;
            return;
        }

        data.forEach(row => {
            const tr = document.createElement("tr");
            orderedHeaders.forEach(h => {
                const td = document.createElement("td");
                td.textContent = row[h] !== undefined ? row[h] : "";
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });
    }

    function triggerSearch() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();

        if (!query) {
            document.getElementById("tableWrapper").style.display = "none";
            document.getElementById("resultInfo").innerText = "";
            return;
        }

        const filtered = sheetData.filter(row =>
            Object.values(row).some(v => String(v).toLowerCase().includes(query))
        );

        document.getElementById("tableWrapper").style.display = "block";
        document.getElementById("resultInfo").innerText =
            "Showing " + filtered.length + " of " + sheetData.length + " records for \"" + query + "\"";

        displayData(filtered);
    }

    function handleKey(e) {
        if (e.key === "Enter") {
            triggerSearch();
            return;
        }
        if (document.getElementById("searchInput").value.trim() === "") {
            document.getElementById("tableWrapper").style.display = "none";
            document.getElementById("resultInfo").innerText = "";
        }
    }

    loadData();
</script>
</body>
</html>
